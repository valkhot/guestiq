name: GuestIQ Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  quality-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Code Quality Gates ─────────────────────────────────────────────
      - name: ESLint — zero errors required
        run: npm run lint

      # Prettier: auto-format and commit any changes rather than blocking.
      # This eliminates recurring pipeline failures caused by minor formatting
      # differences between the AI development environment and Prettier's rules.
      # ESLint (above) remains the blocking quality gate for code correctness.
      - name: Prettier — auto-format
        run: npm run format

      - name: Commit Prettier fixes if any
        run: |
          git config --global user.name "GuestIQ CI"
          git config --global user.email "ci@guestiq.github.io"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "style: auto-format via Prettier [ci]"
            git push
            echo "Prettier fixes committed and pushed."
          else
            echo "No Prettier changes — working tree clean."
          fi

      # ── Build ──────────────────────────────────────────────────────────
      - name: Vite build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_APP_ENV: pilot
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_FEATURE_AUTH_ENABLED: false
          VITE_FEATURE_MULTI_PROPERTY: false
          VITE_FEATURE_ADMIN_ENABLED: false

      # ── Deploy to GitHub Pages ─────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
